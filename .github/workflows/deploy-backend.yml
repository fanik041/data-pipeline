# =============================================================================
# .github/workflows/deploy-backend.yml
# What this file does: On push to main, builds the Docker image, pushes to ACR,
#                      then rolls out the new image to AKS.
# Flow: GitHub -> ACR (docker push) -> AKS (kubectl set image)
# Secrets required in GitHub repo settings:
#   ACR_USERNAME, ACR_PASSWORD  (from: ACR -> Access keys)
#   KUBE_CONFIG                 (from: az aks get-credentials -> base64 of ~/.kube/config)
# =============================================================================
name: Deploy Backend to AKS

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "Dockerfile"
      - "requirements.txt"
      - "k8s/**"

env:
  ACR_LOGIN_SERVER: cmiaregistry.azurecr.io
  IMAGE_NAME: cmia-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04   # pin to AMD64 — ubuntu-latest can be ARM64 on GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to ACR using Access Key credentials stored in GitHub Secrets
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Required for multi-platform builds — without this, 'platforms:' is silently ignored
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Tag image with both git SHA (immutable) and latest (for K8s rolling update)
      # platforms: force linux/amd64 — AKS nodes are AMD64, Mac builds ARM64 which causes exec format error
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64   # AKS node is arm64 (Standard_D2ps_v6 Ampere)
          provenance: false
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # GATE: verify the pushed image is linux/amd64 before deploying to AKS
      # If this fails, exec format error would have occurred on the node — fail fast here instead
      - name: Verify image architecture is amd64
        run: |
          ARCH=$(docker buildx imagetools inspect ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --format '{{range .Manifest.Manifests}}{{.Platform.OS}}/{{.Platform.Architecture}}{{"\n"}}{{end}}' 2>/dev/null \
            || docker manifest inspect ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            | python3 -c "import sys,json; m=json.load(sys.stdin); print(m.get('architecture','unknown'))")
          echo "Detected architecture: $ARCH"
          if echo "$ARCH" | grep -qv "arm64"; then
            echo "ERROR: image is not arm64 — will cause exec format error on AKS (arm64 node). Aborting deploy."
            exit 1
          fi
          echo "PASS: image is amd64 — safe to deploy"

      # Write kubeconfig from secret so kubectl can talk to AKS
      - name: Set up kubectl
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config

      # Rolling update: AKS pulls new image, old pods stay up until new ones are ready
      - name: Deploy to AKS
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl set image deployment/cmia-api \
            cmia-api=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG
          kubectl rollout status deployment/cmia-api --timeout=300s
