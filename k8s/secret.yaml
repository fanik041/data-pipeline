# =============================================================================
# k8s/secret.yaml — DB credentials injected as env vars into the API pod
# What this file does: Stores sensitive config outside the Docker image.
# DO NOT commit with real values — use `kubectl apply` after base64-encoding.
# Encode a value: echo -n "my_value" | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cmia-secrets
  namespace: default
type: Opaque
data:
  # echo -n "your_value" | base64
  AZURE_SQL_SERVER: "Y21pYS1zb3VyY2Utc2VydmVyLmRhdGFiYXNlLndpbmRvd3MubmV0"        # cmia-source-server.database.windows.net
  AZURE_SQL_DATABASE: "Y21pYS1zb3VyY2UtZGI="      # cmia-source-db
  AZURE_SQL_USERNAME: "ZmFoaW0="      # cmia_admin
  AZURE_SQL_PASSWORD: "T3R0YXdhMjAyMQ=="      # your password
  SNOWFLAKE_ACCOUNT: ""
  SNOWFLAKE_USER: ""
  SNOWFLAKE_PASSWORD: ""
  SNOWFLAKE_WAREHOUSE: ""
  SNOWFLAKE_ROLE: ""
