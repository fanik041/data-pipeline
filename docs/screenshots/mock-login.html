<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>CMIA Login</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Fira Sans',sans-serif;background:#060B14;color:#E2E8F0;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.glow1{position:absolute;top:10%;left:15%;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.07) 0%,transparent 70%);pointer-events:none}
.glow2{position:absolute;bottom:5%;right:10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.05) 0%,transparent 70%);pointer-events:none}
.grid{position:absolute;inset:0;opacity:.03;background-image:linear-gradient(#3B82F6 1px,transparent 1px),linear-gradient(90deg,#3B82F6 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.card{width:420px;background:#0C1526;border:1px solid #1A2E50;border-radius:16px;padding:40px;box-shadow:0 0 60px rgba(0,0,0,.5),0 0 0 1px rgba(59,130,246,.06);position:relative;z-index:1}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.logo{width:44px;height:44px;border-radius:10px;background:#3B82F6;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(59,130,246,.35);font-size:22px;color:#fff}
.brand-name{font-size:20px;font-weight:700;letter-spacing:.01em}
.brand-sub{font-size:11px;color:#4A6080;letter-spacing:.08em;margin-top:1px}
h1{font-size:18px;font-weight:600;margin-bottom:6px}
.subtitle{font-size:13px;color:#94A3B8;margin-bottom:28px}
.label{display:block;font-size:11px;font-weight:600;color:#94A3B8;margin-bottom:6px;letter-spacing:.06em}
.field{margin-bottom:16px}
.input{width:100%;background:#112040;border:1px solid #1A2E50;border-radius:6px;color:#E2E8F0;font-family:'Fira Sans',sans-serif;font-size:14px;padding:9px 12px;outline:none}
.input-wrap{position:relative}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#4A6080;font-size:16px}
.btn{width:100%;height:42px;background:#3B82F6;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;box-shadow:0 0 16px rgba(59,130,246,.3)}
.note{margin-top:24px;padding:12px 14px;background:#112040;border-radius:8px;font-size:12px;color:#4A6080}
.note span{color:#F59E0B;font-family:'Fira Code',monospace}
</style></head><body>
<div class="glow1"></div><div class="glow2"></div><div class="grid"></div>
<div class="card">
  <div class="brand">
    <div class="logo">⚡</div>
    <div><div class="brand-name">CMIA</div><div class="brand-sub">CAPITAL MARKETS INTELLIGENCE</div></div>
  </div>
  <h1>Sign in</h1>
  <p class="subtitle">Use your Azure SQL credentials to access the platform.</p>
  <div class="field"><label class="label">USERNAME</label><input class="input" value="cmia_admin" readonly/></div>
  <div class="field"><label class="label">PASSWORD</label><div class="input-wrap"><input class="input" type="password" value="password123" readonly style="padding-right:36px"/><span class="eye">👁</span></div></div>
  <button class="btn">Sign in</button>
  <div class="note"><span>ℹ</span> Credentials are validated against the Azure SQL source DB. Your role permissions apply to all queries.</div>
</div>
</body></html>
